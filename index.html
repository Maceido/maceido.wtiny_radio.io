<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTinyRadio</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: white;
    background: #000 url('./background.png') center center no-repeat fixed;
    background-size: contain;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px 20px 32px;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  .container {
    width: min(1280px, 100%);
    text-align: center;
    margin-top: -110px;
    transform: translateX(40px);
  }

  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }

  .logo-image {
    width: min(80%, 700px);
    height: auto;
    filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.6));
    user-select: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
    display: block;
  }

  .main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 430px;
    gap: 18px;
    align-items: stretch;
    max-width: 1220px;
    margin: -300px auto 0 auto;
    transform: translateX(200px);
  }

  .left-column {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 14px;
    min-width: 0;
  }

  .player-shell,
  .chat-shell,
  .buttons {
    background: linear-gradient(180deg, rgba(55, 23, 10, 0.9), rgba(20, 8, 5, 0.95));
    border: 3px solid rgba(146, 81, 28, 0.95);
    position: relative;
    border-radius: 22px;
    padding: 16px;
  }

  .player-shell {
    box-shadow:
      0 18px 35px rgba(0, 0, 0, 0.55),
      0 0 0 2px rgba(62, 29, 10, 0.85) inset,
      0 0 22px rgba(242, 155, 46, 0.18);
  }

  .chat-shell {
    height: 100%;
    box-shadow:
      0 18px 35px rgba(0, 0, 0, 0.55),
      0 0 0 2px rgba(62, 29, 10, 0.85) inset,
      0 0 24px rgba(87, 157, 255, 0.18);
  }

  .player,
  .chat-frame {
    background: rgba(10, 8, 8, 0.28);
    border-radius: 14px;
    padding: 10px;
  }

  iframe {
    outline: none;
    border: none;
    display: block;
  }

  .player iframe {
    width: 100%;
    height: 144px;
    border-radius: 12px;
    background: transparent;
  }

  .chat-frame {
    height: 100%;
    display: flex;
  }

  .chat-frame iframe {
    width: 100%;
    height: 100%;
    min-height: 680px;
    border-radius: 12px;
    flex: 1;
    background: transparent;
  }

  .buttons {
    display: flex;
    gap: 10px;
    padding: 12px;
    border-radius: 18px;
  }

  .buttons a {
    flex: 1;
    text-decoration: none;
    display: block;
  }

  .buttons img {
    width: 100%;
    display: block;
    transition: transform 0.2s ease;
    pointer-events: none;
  }

  .buttons a:hover img {
    transform: scale(1.05);
  }

  .buttons a:active img {
    transform: scale(0.98);
  }

  @media (max-width: 980px) {
    body {
      align-items: flex-start;
      padding: 16px 14px 24px;
      background-attachment: scroll;
    }

    .container {
      margin-top: 0;
      transform: none;
      width: 100%;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 0 auto;
      transform: none;
    }

    .logo-image {
      width: min(92%, 460px);
    }

    .chat-frame iframe {
      min-height: 500px;
    }
  }

  @media (max-width: 768px) {
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .chat-frame iframe {
      min-height: 360px;
    }
  }

  @media (max-width: 480px) {
    .buttons {
      grid-template-columns: 1fr;
    }

    .chat-frame iframe {
      min-height: 320px;
    }
  }
</style>
</head>
<body>

  <div class="container">
    <div class="logo-wrap">
      <img class="logo-image" src="./logo.png" alt="WTINY Radio">
    </div>

    <div class="main">
      <div class="left-column">
        <div class="player-shell">
          <div class="player">
            <iframe
              src="https://app.radiocult.fm/embed/player/mixman?theme=dusk&primaryColor=%23f5b623&corners=rounded&playerDisplay=metadata"
              title="WTINY Radio Player"
              loading="lazy">
            </iframe>
          </div>
        </div>

        <div class="buttons">
          <a href="#" id="nowPlayingBtn">
            <img src="./now-playing.png" alt="Now Playing">
          </a>

          <a href="mailto:support@wtinyradio.com">
            <img src="./contact.png" alt="Contact">
          </a>
        </div>
      </div>

      <div class="chat-shell">
        <div class="chat-frame">
          <iframe
            src="https://app.radiocult.fm/embed/chat/mixman?theme=midnight&primaryColor=%23579DFF&corners=rounded&playerDisplay=metadata"
            title="WTINY Radio Chat"
            loading="lazy">
          </iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    const nowPlayingBtn = document.getElementById('nowPlayingBtn');

    const STATION_ID = 'mixman';
    let spotifyDirectUrl = '';
    let spotifySearchQuery = '';

    async function updateNowPlaying() {
      try {
        const res = await fetch(`https://api.radiocult.fm/api/station/${STATION_ID}/schedule/live`);
        const data = await res.json();

        const result = data?.result;
        if (!result) return;

        const recognition = result.musicRecognition;
        const metadata = result.metadata;

        spotifyDirectUrl = '';
        spotifySearchQuery = '';

        if (recognition && recognition.status === 'match' && recognition.metadata) {
          const title = recognition.metadata.title || '';
          const artist = recognition.metadata.artist || '';
          const spotifyTrackId = recognition.metadata.spotifyTrackId || null;

          if (spotifyTrackId) {
            spotifyDirectUrl = `https://open.spotify.com/track/${spotifyTrackId}`;
          }

          spotifySearchQuery = [artist, title].filter(Boolean).join(' ').trim();
          return;
        }

        const title = metadata?.title || '';
        const artist = metadata?.artist || '';

        if (title && title.toLowerCase() !== 'live') {
          spotifySearchQuery = [artist, title].filter(Boolean).join(' ').trim();
        } else if (artist) {
          spotifySearchQuery = artist.trim();
        }
      } catch (err) {
        console.error('Could not fetch now playing:', err);
      }
    }

    updateNowPlaying();
    setInterval(updateNowPlaying, 10000);

    nowPlayingBtn.addEventListener('click', function (e) {
      e.preventDefault();

      if (spotifyDirectUrl) {
        window.open(spotifyDirectUrl, '_blank');
        return;
      }

      if (spotifySearchQuery) {
        window.open(`https://open.spotify.com/search/${encodeURIComponent(spotifySearchQuery)}`, '_blank');
        return;
      }

      window.open('https://open.spotify.com/', '_blank');
    });
  </script>

</body>
</html>
