<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTinyRadio</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  overflow-x: hidden;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: white;
  background: #000 url('./background.png') center center no-repeat fixed;
  background-size: contain;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px 20px 32px;
}

/* ====== LAYOUT (UNCHANGED) ====== */

.container {
  width: min(1280px, 100%);
  text-align: center;
  margin-top: -110px;
  transform: translateX(40px);
}

.logo-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
}

.logo-image {
  width: min(80%, 700px);
  height: auto;
  filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.6));
}

.main {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 430px;
  gap: 18px;
  align-items: stretch;
  max-width: 1220px;
  margin: -300px auto 0 auto;
  transform: translateX(200px);
}

.left-column {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 14px;
}

/* ====== LED SHELL SYSTEM ====== */

.player-shell,
.chat-shell,
.buttons {
  position: relative;
  border-radius: 22px;
  padding: 16px;
  overflow: hidden;
  background: linear-gradient(180deg, rgba(35,14,8,0.72), rgba(14,5,4,0.86));
  box-shadow: 0 18px 35px rgba(0,0,0,0.55);
}

/* ===== PLAYER ===== */
.player-shell {
  border: 2px solid rgba(255,170,50,0.3);
  box-shadow:
    0 0 6px rgba(255,170,50,0.35),
    0 0 14px rgba(255,140,30,0.25),
    0 18px 35px rgba(0,0,0,0.55);
}

.player-shell::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px;
  border-radius: inherit;

  background:
    linear-gradient(90deg,
      transparent 0%,
      transparent 40%,
      rgba(255,230,180,0.95) 50%,
      transparent 60%,
      transparent 100%);

  background-size: 300% 100%;
  animation: ledMove 4s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  filter:
    drop-shadow(0 0 6px rgba(255,200,120,0.9))
    drop-shadow(0 0 16px rgba(255,140,40,0.5));
}

/* ===== CHAT ===== */
.chat-shell {
  height: 100%;
  border: 2px solid rgba(90,175,255,0.25);
}

.chat-shell::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px;
  border-radius: inherit;

  background:
    linear-gradient(90deg,
      transparent 0%,
      transparent 35%,
      rgba(140,220,255,0.95) 50%,
      transparent 65%,
      transparent 100%);

  background-size: 320% 100%;
  animation: ledMove 5.5s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  filter:
    drop-shadow(0 0 6px rgba(140,220,255,0.9))
    drop-shadow(0 0 18px rgba(255,145,30,0.35));
}

/* ===== BUTTONS ===== */
.buttons {
  display: flex;
  gap: 10px;
  padding: 12px;
  border-radius: 18px;
  border: 2px solid rgba(255,170,50,0.25);
}

.buttons::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px;
  border-radius: inherit;

  background:
    linear-gradient(90deg,
      transparent 0%,
      transparent 40%,
      rgba(255,240,200,0.95) 50%,
      transparent 60%,
      transparent 100%);

  background-size: 300% 100%;
  animation: ledMove 3.5s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  filter:
    drop-shadow(0 0 6px rgba(255,200,120,0.8))
    drop-shadow(0 0 14px rgba(255,130,20,0.45));
}

/* ===== INNER CONTENT ===== */

.player,
.chat-frame {
  background: rgba(10, 8, 8, 0.28);
  border-radius: 14px;
  padding: 10px;
  position: relative;
  z-index: 1;
}

iframe {
  border: none;
  display: block;
}

.player iframe {
  width: 100%;
  height: 144px;
  border-radius: 12px;
}

.chat-frame iframe {
  width: 100%;
  height: 100%;
  min-height: 680px;
  border-radius: 12px;
}

/* ===== BUTTONS ===== */

.buttons a {
  flex: 1;
  display: block;
}

.buttons img {
  width: 100%;
  transition: transform 0.2s ease;
}

.buttons a:hover img {
  transform: scale(1.05);
}

.buttons a:active img {
  transform: scale(0.98);
}

/* ===== ANIMATION ===== */

@keyframes ledMove {
  0% { background-position: 0% 0; }
  100% { background-position: 300% 0; }
}

/* ===== MOBILE ===== */

@media (max-width: 980px) {
  body {
    align-items: flex-start;
    background-attachment: scroll;
  }

  .container {
    margin-top: 0;
    transform: none;
  }

  .main {
    display: flex;
    flex-direction: column;
    transform: none;
    margin: 0 auto;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="logo-wrap">
    <img class="logo-image" src="./logo.png">
  </div>

  <div class="main">

    <div class="left-column">

      <div class="player-shell">
        <div class="player">
          <iframe
            src="https://app.radiocult.fm/embed/player/mixman?theme=dusk&primaryColor=%23f5b623&corners=rounded&playerDisplay=metadata">
          </iframe>
        </div>
      </div>

      <div class="buttons">
        <a href="#" id="nowPlayingBtn">
          <img src="./now-playing.png">
        </a>

        <a href="mailto:support@wtinyradio.com">
          <img src="./contact.png">
        </a>
      </div>

    </div>

    <div class="chat-shell">
      <div class="chat-frame">
        <iframe
          src="https://app.radiocult.fm/embed/chat/mixman?theme=midnight&primaryColor=%23579DFF&corners=rounded">
        </iframe>
      </div>
    </div>

  </div>
</div>

<script>
const nowPlayingBtn = document.getElementById('nowPlayingBtn');

const STATION_ID = 'mixman';
let spotifyDirectUrl = '';
let spotifySearchQuery = '';

async function updateNowPlaying() {
  try {
    const res = await fetch(`https://api.radiocult.fm/api/station/${STATION_ID}/schedule/live`);
    const data = await res.json();

    const result = data?.result;
    if (!result) return;

    const recognition = result.musicRecognition;
    const metadata = result.metadata;

    spotifyDirectUrl = '';
    spotifySearchQuery = '';

    if (recognition && recognition.status === 'match') {
      const title = recognition.metadata.title || '';
      const artist = recognition.metadata.artist || '';
      const id = recognition.metadata.spotifyTrackId;

      if (id) {
        spotifyDirectUrl = `https://open.spotify.com/track/${id}`;
      }

      spotifySearchQuery = `${artist} ${title}`;
      return;
    }

    const title = metadata?.title || '';
    const artist = metadata?.artist || '';
    spotifySearchQuery = `${artist} ${title}`;

  } catch {}
}

updateNowPlaying();
setInterval(updateNowPlaying, 10000);

nowPlayingBtn.addEventListener('click', e => {
  e.preventDefault();

  if (spotifyDirectUrl) {
    window.open(spotifyDirectUrl);
  } else if (spotifySearchQuery) {
    window.open(`https://open.spotify.com/search/${encodeURIComponent(spotifySearchQuery)}`);
  }
});
</script>

</body>
</html>
