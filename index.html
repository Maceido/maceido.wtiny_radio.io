<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WTinyRadio</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      color: white;
      background: url('./background.png') center center no-repeat fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 20px 32px;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    .container {
      width: min(1280px, 100%);
      text-align: center;
      margin-top: -110px;
      transform: translateX(40px);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .logo-image {
      width: min(80%, 700px);
      height: auto;
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.6));
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      display: block;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      gap: 18px;
      align-items: stretch;
      max-width: 1220px;
      margin: -300px auto 0 auto;
      transform: translateX(200px);
    }

    .left-column {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 14px;
    }

    .player-shell,
    .chat-shell,
    .buttons {
      background: linear-gradient(180deg, rgba(55, 23, 10, 0.9), rgba(20, 8, 5, 0.95));
      border: 3px solid rgba(146, 81, 28, 0.95);
      position: relative;
      border-radius: 22px;
      padding: 16px;
    }

    .player-shell {
      box-shadow:
        0 18px 35px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(62, 29, 10, 0.85) inset,
        0 0 22px rgba(242, 155, 46, 0.18);
    }

    .chat-shell {
      height: 100%;
      box-shadow:
        0 18px 35px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(62, 29, 10, 0.85) inset,
        0 0 24px rgba(87, 157, 255, 0.18);
    }

    .player,
    .chat-frame {
      background: rgba(10, 8, 8, 0.28);
      border-radius: 14px;
      padding: 10px;
    }

    iframe {
      outline: none;
      border: none;
      display: block;
    }

    .player iframe {
      width: 100%;
      height: 144px;
      border-radius: 12px;
      background: transparent;
    }

    .chat-frame {
      height: 100%;
      display: flex;
    }

    .chat-frame iframe {
      width: 100%;
      height: 100%;
      min-height: 680px;
      border-radius: 12px;
      flex: 1;
      background: transparent;
    }

    .buttons {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
    }

    .buttons a {
      flex: 1;
      text-decoration: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      outline: none;
    }

    .buttons img {
      width: 100%;
      display: block;
      transition: transform 0.2s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .buttons a:hover img {
      transform: scale(1.05);
    }

    @media (max-width: 980px) {
      .container {
        margin-top: 0;
        transform: none;
      }

      .main {
        display: flex;
        flex-direction: column;
        margin: 0 auto;
        transform: none;
      }

      .left-column {
        justify-content: flex-start;
      }

      .chat-frame iframe {
        min-height: 520px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-wrap">
      <img class="logo-image" src="./logo.png" alt="WTINY Radio">
    </div>

    <div class="main">
      <div class="left-column">
        <div class="player-shell">
          <div class="player">
            <iframe
              src="https://app.radiocult.fm/embed/player/mixman?theme=dusk&primaryColor=%23f5b623&corners=rounded&playerDisplay=metadata"
              title="WTINY Radio Player">
            </iframe>
          </div>
        </div>

        <div class="buttons">
          <a href="#"><img src="./now-playing.png" alt="Now Playing"></a>
          <a href="#"><img src="./song-requests.png" alt="Song Requests"></a>
          <a href="mailto:support@wtinyradio.com"><img src="./contact.png" alt="Contact"></a>
        </div>
      </div>

      <div class="chat-shell">
        <div class="chat-frame">
          <iframe
            src="https://app.radiocult.fm/embed/chat/mixman?theme=midnight&primaryColor=%23579DFF&corners=rounded&playerDisplay=metadata"
            title="WTINY Radio Chat">
          </iframe>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
