<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTinyRadio</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: white;
      background: #000 url('./background.png') center center / cover no-repeat fixed;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 8px 20px 12px;
      overflow-y: hidden;
    }

    .container {
      width: min(1500px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .logo-image {
      width: min(70%, 560px);
      height: auto;
      display: block;
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.6));
    }

    .main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 360px;
      gap: 22px;
      width: 100%;
      max-width: 1280px;
      align-items: stretch;
      margin-top: -18px;
    }

    .left-column {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .player-shell,
    .chat-shell,
    .schedule-shell,
    .buttons {
      position: relative;
      border-radius: 22px;
      padding: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(35, 14, 8, 0.72), rgba(14, 5, 4, 0.86));
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.55);
    }

    .player-shell {
      border: 2px solid rgba(255, 170, 50, 0.3);
      box-shadow:
        0 0 6px rgba(255, 170, 50, 0.35),
        0 0 14px rgba(255, 140, 30, 0.25),
        0 18px 35px rgba(0, 0, 0, 0.55);
    }

    .player-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 2px;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        transparent 0%,
        transparent 40%,
        rgba(255, 230, 180, 0.95) 50%,
        transparent 60%,
        transparent 100%
      );
      background-size: 300% 100%;
      animation: ledMove 4s linear infinite;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter:
        drop-shadow(0 0 6px rgba(255, 200, 120, 0.9))
        drop-shadow(0 0 16px rgba(255, 140, 40, 0.5));
      pointer-events: none;
    }

    .schedule-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      border: 2px solid rgba(255, 170, 50, 0.24);
      box-shadow:
        0 0 6px rgba(255, 170, 50, 0.18),
        0 0 14px rgba(255, 140, 30, 0.14),
        0 18px 35px rgba(0, 0, 0, 0.55);
    }

    .schedule-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 2px;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        transparent 0%,
        transparent 35%,
        rgba(255, 230, 180, 0.92) 50%,
        transparent 65%,
        transparent 100%
      );
      background-size: 320% 100%;
      animation: ledMove 5.2s linear infinite;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter:
        drop-shadow(0 0 5px rgba(255, 210, 130, 0.75))
        drop-shadow(0 0 14px rgba(255, 140, 40, 0.35));
      pointer-events: none;
    }

    .chat-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      border: 2px solid rgba(90, 175, 255, 0.25);
    }

    .chat-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 2px;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        transparent 0%,
        transparent 35%,
        rgba(140, 220, 255, 0.95) 50%,
        transparent 65%,
        transparent 100%
      );
      background-size: 320% 100%;
      animation: ledMove 5.5s linear infinite;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter:
        drop-shadow(0 0 6px rgba(140, 220, 255, 0.9))
        drop-shadow(0 0 18px rgba(255, 145, 30, 0.35));
      pointer-events: none;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      border: 2px solid rgba(255, 170, 50, 0.25);
    }

    .buttons::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 2px;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        transparent 0%,
        transparent 40%,
        rgba(255, 240, 200, 0.95) 50%,
        transparent 60%,
        transparent 100%
      );
      background-size: 300% 100%;
      animation: ledMove 3.5s linear infinite;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter:
        drop-shadow(0 0 6px rgba(255, 200, 120, 0.8))
        drop-shadow(0 0 14px rgba(255, 130, 20, 0.45));
      pointer-events: none;
    }

    .player,
    .chat-frame,
    .schedule-frame {
      background: rgba(10, 8, 8, 0.28);
      border-radius: 14px;
      padding: 10px;
      position: relative;
      z-index: 1;
    }

    .schedule-frame,
    .chat-frame {
      flex: 1;
      display: flex;
    }

    iframe {
      border: none;
      display: block;
      width: 100%;
    }

    .player iframe {
      width: 100%;
      height: 150px;
      border-radius: 12px;
    }

    .schedule-frame iframe,
    .chat-frame iframe {
      width: 100%;
      height: 100%;
      min-height: 580px;
      border-radius: 12px;
      background: transparent;
    }

    .buttons a {
      flex: 1;
      display: block;
      position: relative;
      z-index: 2;
    }

    .buttons img {
      width: 100%;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.2s ease;
    }

    .buttons a:hover img {
      transform: scale(1.05);
    }

    .buttons a:active img {
      transform: scale(0.98);
    }

    @keyframes ledMove {
      0% { background-position: 0% 0; }
      100% { background-position: 300% 0; }
    }

    @media (max-width: 1280px) {
      .main {
        grid-template-columns: 340px minmax(0, 1.1fr) 340px;
        max-width: 1160px;
      }
    }

    @media (max-width: 980px) {
      body {
        align-items: flex-start;
        background-attachment: scroll;
        background-position: center center;
        background-repeat: no-repeat;
        background-size: cover;
        padding: 10px 12px 16px;
        overflow-y: auto;
      }

      .container {
        width: 100%;
        gap: 12px;
      }

      .logo-image {
        width: min(86%, 380px);
      }

      .main {
        display: flex;
        flex-direction: column;
        max-width: 100%;
        margin-top: 8px;
        gap: 12px;
      }

      .left-column {
        display: block;
      }

      .schedule-frame iframe,
      .chat-frame iframe {
        min-height: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="logo-wrap">
      <img class="logo-image" src="./logo.png" alt="WTinyRadio Logo">
    </div>

    <div class="main">

      <div class="schedule-shell">
        <div class="schedule-frame">
          <iframe
            src="https://app.radiocult.fm/embed/schedule/mixman/show-list?theme=dusk&primaryColor=%23579DFF&corners=rounded&removeRcBranding=true"
            title="WTINY Radio Schedule"
            loading="lazy">
          </iframe>
        </div>
      </div>

      <div class="left-column">
        <div class="player-shell">
          <div class="player">
            <iframe
              src="https://app.radiocult.fm/embed/player/mixman?theme=dusk&primaryColor=%23579DFF&corners=rounded&playerDisplay=metadata&removeRcBranding=true"
              title="WTINY Radio Player"
              loading="lazy">
            </iframe>
          </div>
        </div>

        <div class="buttons">
          <a href="#" id="nowPlayingBtn">
            <img src="./now-playing.png" alt="Now Playing">
          </a>

          <a href="mailto:support@wtinyradio.com">
            <img src="./contact.png" alt="Contact">
          </a>
        </div>
      </div>

      <div class="chat-shell">
        <div class="chat-frame">
          <iframe
            src="https://app.radiocult.fm/embed/chat/mixman?theme=midnight&primaryColor=%23579DFF&corners=rounded&removeRcBranding=true"
            title="WTINY Radio Chat"
            loading="lazy">
          </iframe>
        </div>
      </div>

    </div>
  </div>

  <script>
    const STATION_ID = 'mixman';
    let spotifyDirectUrl = '';
    let spotifySearchQuery = '';

    async function updateNowPlaying() {
      try {
        const res = await fetch(`https://api.radiocult.fm/api/station/${STATION_ID}/schedule/live`);
        const data = await res.json();

        const result = data?.result;
        if (!result) return;

        const recognition = result.musicRecognition;
        const metadata = result.metadata;

        spotifyDirectUrl = '';
        spotifySearchQuery = '';

        if (recognition && recognition.status === 'match') {
          const title = recognition.metadata?.title || '';
          const artist = recognition.metadata?.artist || '';
          const id = recognition.metadata?.spotifyTrackId || '';

          if (id) {
            spotifyDirectUrl = `https://open.spotify.com/track/${id}`;
          }

          spotifySearchQuery = `${artist} ${title}`.trim();
          return;
        }

        spotifySearchQuery = `${metadata?.artist || ''} ${metadata?.title || ''}`.trim();
      } catch (err) {
        console.log('Now playing fetch failed:', err);
      }
    }

    updateNowPlaying();
    setInterval(updateNowPlaying, 10000);

    document.getElementById('nowPlayingBtn').onclick = (e) => {
      e.preventDefault();

      if (spotifyDirectUrl) {
        window.open(spotifyDirectUrl, '_blank');
      } else if (spotifySearchQuery) {
        window.open(`https://open.spotify.com/search/${encodeURIComponent(spotifySearchQuery)}`, '_blank');
      }
    };
  </script>
</body>
</html>
